<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <title>EasyRPG Player</title>
    <style>
      :root {
        --color-gray: hsl(0 0% 55%);
        --controls-size: clamp(3.5rem, 20vmin, 5.5rem);
        --controls-opacity: 0.4;
        --controls-fade: 80ms;
      }

      html {
        touch-action: none;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        color: white;
        background: black;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #boot {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-content: center;
        justify-items: center;
        font-family: ui-monospace, monospace;
        text-align: center;
        background: black;
        pointer-events: none;
        transition:
          opacity 300ms ease,
          visibility 300ms ease;
      }

      #boot.done {
        visibility: hidden;
        opacity: 0;
      }

      #status {
        font-size: 0.875rem;
        color: var(--color-gray);
      }

      #controls {
        position: fixed;
        top: env(safe-area-inset-top);
        right: env(safe-area-inset-right);
        z-index: 10;
      }

      #controls button {
        display: inline-flex;
        padding: 0.5rem;
        color: white;
        background: transparent;
        border: 0;
        cursor: pointer;
      }

      #controls button[hidden] {
        display: none;
      }

      #controls button[aria-pressed="false"] {
        opacity: 0.55;
      }

      #canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        border: 0;
        outline: none;
        image-rendering: pixelated;
        transform: translate(-50%, -50%);
      }

      img#canvas {
        object-fit: contain;
      }

      /* Pixel-perfect mode: `!important` beats the inline styles SDL
         writes onto the canvas while it manages its window size */
      body[data-scaling="integer"] #canvas {
        width: var(--canvas-width, 100%) !important;
        height: var(--canvas-height, 100%) !important;
      }

      @media (hover: none), (pointer: coarse) {
        #viewport {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100dvh;
          display: grid;
          grid-template-areas:
            "screen screen"
            "dpad apad";
          grid-template-rows: minmax(0, 1fr) auto;
          grid-template-columns: 1fr 1fr;
        }

        #canvas {
          position: static;
          grid-area: screen;
          object-fit: contain;
          outline: 1px solid hsl(0 0% 25%);
          box-shadow: 0 0 0 6px hsl(0 0% 8%);
          transform: none;
        }

        body[data-scaling="integer"] #canvas {
          place-self: center;
        }

        #dpad,
        #apad {
          align-self: center;
        }

        #dpad {
          grid-area: dpad;
          padding: 0.75rem 0 calc(0.75rem + env(safe-area-inset-bottom))
            calc(0.75rem + env(safe-area-inset-left));
        }

        #apad {
          grid-area: apad;
          justify-self: end;
          padding: 0.75rem calc(0.75rem + env(safe-area-inset-right))
            calc(0.75rem + env(safe-area-inset-bottom)) 0;
        }

        @media (orientation: landscape) {
          #viewport {
            grid-template-areas: "dpad screen apad";
            grid-template-rows: minmax(0, 1fr);
            grid-template-columns: auto minmax(0, 1fr) auto;
          }

          #dpad {
            padding: 0 0.75rem 0 calc(0.75rem + env(safe-area-inset-left));
          }

          #apad {
            padding: 0 calc(0.75rem + env(safe-area-inset-right)) 0 0.75rem;
          }
        }
      }

      #dpad svg {
        width: calc(2 * var(--controls-size));
        height: calc(2 * var(--controls-size));
        fill: var(--color-gray);
      }

      #apad > * {
        width: var(--controls-size);
        height: var(--controls-size);
        background-color: var(--color-gray);
        border-radius: 50%;
      }

      #apad > :first-child {
        margin-left: var(--controls-size);
      }

      #dpad svg > *,
      #apad > * {
        opacity: var(--controls-opacity);
        transition:
          opacity var(--controls-fade) ease,
          scale 80ms ease;
      }

      #dpad path {
        transform-box: fill-box;
        transform-origin: center;
      }

      #dpad path.active,
      #apad > .active {
        opacity: 1;
        scale: 0.94;
      }

      /* Idle dims the whole deck by flipping the shared opacity var */
      body.controls-idle {
        --controls-opacity: 0.2;
        --controls-fade: 500ms;
      }

      body.gamepad-connected #dpad,
      body.gamepad-connected #apad {
        display: none;
      }

      @media (hover: hover) and (pointer: fine) {
        #apad,
        #dpad {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button
        id="controls-scaling"
        type="button"
        aria-label="Pixel-perfect scaling"
        aria-pressed="false"
      >
        <svg
          viewBox="0 0 15 15"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          width="25"
          height="25"
        >
          <path
            d="M7 4.5H8M10 7.5H11M7 7.5H8M7 10.5H8M4 7.5H5M1.5 1.5H13.5V13.5H1.5V1.5Z"
            stroke="currentColor"
          ></path>
        </svg>
      </button>
      <button
        id="controls-fullscreen"
        type="button"
        aria-label="Enter fullscreen"
      >
        <svg
          viewBox="0 0 15 15"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          width="25"
          height="25"
        >
          <path
            d="M13.5 13.5H10m3.5 0V10m0 3.5l-4-4m.5-8h3.5m0 0V5m0-3.5l-4 4M5 1.5H1.5m0 0V5m0-3.5l4 4m-4 4.5v3.5m0 0H5m-3.5 0l4-4"
            stroke="currentColor"
          ></path>
        </svg>
      </button>
    </div>

    <div id="boot">
      <div id="status"></div>
    </div>

    <div id="viewport">
      <canvas id="canvas" tabindex="-1"></canvas>

      <div id="dpad" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
          <path
            id="dpad-up"
            data-key="ArrowUp"
            d="M48,5.8C48,2.5,45.4,0,42,0H29.9C26.6,0,24,2.4,24,5.8V24h24V5.8z"
          />
          <path
            id="dpad-right"
            data-key="ArrowRight"
            d="M66.2,24H48v24h18.2c3.3,0,5.8-2.7,5.8-6V29.9C72,26.5,69.5,24,66.2,24z"
          />
          <path
            id="dpad-down"
            data-key="ArrowDown"
            d="M24,66.3c0,3.3,2.6,5.7,5.9,5.7H42c3.3,0,6-2.4,6-5.7V48H24V66.3z"
          />
          <path
            id="dpad-left"
            data-key="ArrowLeft"
            d="M5.7,24C2.4,24,0,26.5,0,29.9V42c0,3.3,2.3,6,5.7,6H24V24H5.7z"
          />
          <rect id="dpad-center" x="24" y="24" width="24" height="24" />
        </svg>
      </div>

      <div id="apad" aria-hidden="true">
        <div id="apad-enter" data-key="Enter"></div>
        <div id="apad-escape" data-key="Escape"></div>
      </div>
    </div>

    <script src="index.js" async></script>

    <script type="module">
      const gameId = new URLSearchParams(location.search).get("game");
      if (gameId) {
        document.title = `${gameId} – EasyRPG Player`;
      }

      const hasTouchscreen = window.matchMedia(
        "(hover: none), (pointer: coarse)",
      ).matches;
      const preventNativeKeys = [
        "ArrowUp",
        "ArrowDown",
        "ArrowRight",
        "ArrowLeft",
        " ",
        "F1",
        "F3",
        "F5",
        "F7",
        "F12",
      ];
      /** @type {Map<string, string>} */
      const keys = new Map();
      /**
       * Pointers that started on a control and may slide between them
       * @type {Set<number>}
       */
      const engagedPointers = new Set();
      /**
       * Control element id currently pressed by each engaged pointer
       * @type {Map<number, string>}
       */
      const pressedControls = new Map();
      const viewport = document.getElementById("viewport");
      const canvas = document.getElementById("canvas");
      // RPG Maker 2000/2003 games render at a native 320x240
      const nativeGameWidth = 320;
      const nativeGameHeight = 240;
      /** @type {Set<number>} */
      const connectedGamepads = new Set();
      let controlsIdleTimeoutId;

      // Launch the Player; it reads the game from the query string itself
      window.addEventListener("load", async () => {
        const player = await createEasyRpgPlayer({
          game: undefined,
          saveFs: undefined,
        });
        player.initApi();
        canvas.focus();
        document.getElementById("boot").classList.add("done");
      });

      // Focus the canvas on hover/click so keyboard input reaches the game
      // (e.g. when embedded in another page)
      canvas.addEventListener("mouseenter", () => canvas.focus());
      canvas.addEventListener("click", () => canvas.focus());

      // Element fullscreen is unavailable in some browsers, e.g. iPhone Safari
      const fullscreenButton = document.getElementById("controls-fullscreen");
      if (document.fullscreenEnabled) {
        fullscreenButton.addEventListener("click", () =>
          viewport.requestFullscreen(),
        );
      } else {
        fullscreenButton.hidden = true;
      }

      // Pixel-perfect scaling, persisted across sessions
      const scalingButton = document.getElementById("controls-scaling");
      const scalingStorageKey = "easyrpg-player-scaling";
      scalingButton.addEventListener("click", () => {
        setIntegerScaling(document.body.dataset.scaling !== "integer");
      });
      window.addEventListener("resize", applyIntegerScale);

      let storedScalingMode = null;
      try {
        storedScalingMode = localStorage.getItem(scalingStorageKey);
      } catch {
        // Storage can be unavailable (e.g. blocked cookies); start in
        // fit mode
      }
      setIntegerScaling(storedScalingMode === "integer");

      // Bind all elements providing a `data-key` attribute with the
      // given key on touch-based devices
      if (hasTouchscreen) {
        for (const button of document.querySelectorAll("[data-key]")) {
          bindKey(button, button.dataset.key);
        }
        wakeTouchControls();
      } else {
        // Stop the browser's default for keys the game uses
        window.addEventListener("keydown", (event) => {
          if (preventNativeKeys.includes(event.key)) {
            event.preventDefault();
          }
        });

        canvas.addEventListener("contextmenu", (event) => {
          event.preventDefault();
        });
      }

      window.addEventListener("gamepadconnected", (event) => {
        connectedGamepads.add(event.gamepad.index);
        updateTouchControlsVisibility();
      });
      window.addEventListener("gamepaddisconnected", (event) => {
        connectedGamepads.delete(event.gamepad.index);
        updateTouchControlsVisibility();
      });

      // The wake lock is released whenever the tab gets hidden, so it has
      // to be re-requested every time the player becomes visible again
      requestWakeLock();
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          requestWakeLock();
        }
      });

      /**
       * Simulate a keyboard event on the Emscripten canvas
       *
       * @param {string} eventType Type of the keyboard event
       * @param {string} code Physical key code to simulate (e.g. "ArrowUp")
       */
      function simulateKeyboardEvent(eventType, code) {
        canvas.dispatchEvent(
          new KeyboardEvent(eventType, { code, bubbles: true }),
        );
      }

      /**
       * Bind an element by a specific key to simulate on touch
       *
       * @param {HTMLElement} element The element to bind a key to
       * @param {string} key Key to simulate
       */
      function bindKey(element, key) {
        keys.set(element.id, key);

        element.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          engagedPointers.add(event.pointerId);
          pressControl(event.pointerId, element.id);

          // Touch input captures implicitly; mouse and pen need an
          // explicit capture so the gesture keeps firing on this element
          try {
            element.setPointerCapture(event.pointerId);
          } catch {
            // The pointer may already be gone
          }
        });

        // Slide between controls without lifting the pointer
        element.addEventListener("pointermove", (event) => {
          if (!engagedPointers.has(event.pointerId)) return;

          const targetId = document.elementFromPoint(
            event.clientX,
            event.clientY,
          )?.id;
          if (targetId === pressedControls.get(event.pointerId)) return;

          if (targetId && keys.has(targetId)) {
            pressControl(event.pointerId, targetId);
          } else {
            releaseControl(event.pointerId);
          }
        });

        for (const eventType of ["pointerup", "pointercancel"]) {
          element.addEventListener(eventType, (event) => {
            engagedPointers.delete(event.pointerId);
            releaseControl(event.pointerId);
          });
        }
      }

      /**
       * Press a control, releasing whatever the pointer held before
       *
       * @param {number} pointerId Pointer pressing the control
       * @param {string} elementId Element id of the control to press
       */
      function pressControl(pointerId, elementId) {
        releaseControl(pointerId);
        wakeTouchControls();

        pressedControls.set(pointerId, elementId);
        simulateKeyboardEvent("keydown", keys.get(elementId));
        document.getElementById(elementId).classList.add("active");
      }

      /**
       * Release the control held by a pointer, unless another pointer
       * still presses the same control
       *
       * @param {number} pointerId Pointer to release
       */
      function releaseControl(pointerId) {
        const elementId = pressedControls.get(pointerId);
        if (!elementId) return;

        wakeTouchControls();
        pressedControls.delete(pointerId);
        if ([...pressedControls.values()].includes(elementId)) return;

        simulateKeyboardEvent("keyup", keys.get(elementId));
        document.getElementById(elementId).classList.remove("active");
      }

      function updateTouchControlsVisibility() {
        document.body.classList.toggle(
          "gamepad-connected",
          connectedGamepads.size > 0,
        );
      }

      /**
       * Toggle pixel-perfect scaling and persist the choice
       *
       * @param {boolean} isEnabled Whether to snap to integer multiples
       */
      function setIntegerScaling(isEnabled) {
        if (isEnabled) {
          document.body.dataset.scaling = "integer";
        } else {
          delete document.body.dataset.scaling;
        }
        scalingButton.setAttribute("aria-pressed", String(isEnabled));

        try {
          localStorage.setItem(
            scalingStorageKey,
            isEnabled ? "integer" : "fit",
          );
        } catch {
          // The toggle still works without persistence
        }

        applyIntegerScale();

        // SDL only re-reads the canvas size on window resize, so nudge
        // it after the CSS box of the canvas changed
        window.dispatchEvent(new Event("resize"));
      }

      /**
       * Snap the canvas to the largest whole multiple of the native game
       * resolution that fits the available space
       */
      function applyIntegerScale() {
        const rootStyle = document.documentElement.style;
        rootStyle.removeProperty("--canvas-width");
        rootStyle.removeProperty("--canvas-height");
        if (document.body.dataset.scaling !== "integer") return;

        // With the properties cleared the canvas spans 100% again, so its
        // client box measures the available space
        const scale = Math.max(
          1,
          Math.floor(
            Math.min(
              canvas.clientWidth / nativeGameWidth,
              canvas.clientHeight / nativeGameHeight,
            ),
          ),
        );
        rootStyle.setProperty("--canvas-width", `${nativeGameWidth * scale}px`);
        rootStyle.setProperty(
          "--canvas-height",
          `${nativeGameHeight * scale}px`,
        );
      }

      /**
       * Light up the touch controls and dim them again after a few
       * seconds without input
       */
      function wakeTouchControls() {
        document.body.classList.remove("controls-idle");
        clearTimeout(controlsIdleTimeoutId);
        controlsIdleTimeoutId = setTimeout(() => {
          // Keep the controls lit while something is still pressed
          if (pressedControls.size > 0) {
            wakeTouchControls();
            return;
          }
          document.body.classList.add("controls-idle");
        }, 3000);
      }

      async function requestWakeLock() {
        try {
          await navigator.wakeLock?.request("screen");
        } catch {
          // Keeping the screen awake is a progressive enhancement; the
          // request is denied e.g. in power-save mode
        }
      }
    </script>
  </body>
</html>
