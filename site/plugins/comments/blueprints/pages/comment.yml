title: Kommentar

icon: 💬

options:
  changeTemplate: false

status:
  draft:
    label: Ausgeblendet
    text: Nur du siehst diesen Kommentar
  unlisted:
    label: Sichtbar
    text: Öffentlich unter dem Artikel

num: false

columns:
  main:
    width: 2/3
    fields:
      name:
        label: Name
        type: text
        required: true
        maxlength: 60
      text:
        label: Kommentar
        type: textarea
        required: true
        maxlength: 4000
        buttons: false
  sidebar:
    width: 1/3
    fields:
      date:
        label: Datum
        type: date
        time: true
        display: DD.MM.YYYY
        required: true
      author:
        label: Als Entwickler markieren
        type: users
        max: 1
        help: Verknüpft den Kommentar mit deinem Panel-Konto und zeigt das Entwickler-Abzeichen. Nur für eigene Antworten setzen.
      parentId:
        label: Antwort auf
        type: pages
        image: false
        disabled: true
        help: Interne Referenz auf den übergeordneten Kommentar. Wird automatisch gesetzt.
