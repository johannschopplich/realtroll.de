title: Übersicht

tabs:
  content:
    label: Spiele
    icon: dashboard
    sections:
      games: sections/games

  blog:
    label: Blog
    icon: text
    sections:
      articles:
        type: pages
        label: Artikel
        parent: site.find("blog")
        template: article
        sortBy: date desc
        info: "{{ page.date.toDate('d.m.Y') }}"

  pages:
    label: Seiten
    icon: page
    sections:
      pages:
        type: pages
        label: Seiten
        create: default
        image:
          back: white
      footerFields:
        type: fields
        fields:
          footerHeadline:
            label: Footer
            type: headline
          footerColumns:
            label: Spalten
            type: structure
            text: "{{ heading }}"
            empty: Noch keine Spalten angelegt.
            help: Jede Zeile wird zu einer Footer-Spalte – mit Überschrift und den darunter verlinkten Seiten. Reihenfolge frei sortierbar.
            fields:
              heading:
                label: Überschrift
                type: text
                required: true
              links:
                label: Seiten
                type: pages
                query: site.index.filterBy("template", "!=", "article")
                image:
                  back: white
          social:
            label: Social-Media
            type: structure
            text: "{{ platform }}"
            empty: Noch keine Profile verlinkt.
            fields:
              platform:
                label: Plattform
                type: select
                width: 1/3
                options:
                  instagram: Instagram
                  youtube: YouTube
              url:
                label: URL
                type: url
                width: 2/3

  seo:
    label: SEO
    icon: search
    sections:
      seoFields:
        type: fields
        fields:
          description:
            extends: fields/description
            help: Eine kurze Beschreibung der Website. Wird für Seiten ohne eigene Beschreibung verwendet.
          thumbnail:
            extends: fields/thumbnail
            query: site.files.template('image')
            help: Wird für Seiten ohne eigenes Vorschaubild verwendet.

  images: tabs/images
