title: Übersicht

tabs:
  blog:
    label: Blog
    icon: text
    sections:
      articles:
        type: pages
        label: Artikel
        parent: site.find("blog")
        template: article
        sortBy: date desc
        search: true
        layout: table
        image: false
        info: "{{ page.date.toDate('d.m.Y') }}"
      comments:
        type: pages
        label: Neueste Kommentare
        query: page("blog").index(true).filterBy("intendedTemplate", "comment").sortBy("date", "desc")
        template: comment
        # Draft inclusion comes from index(true), not status – kept as intent documentation
        status: all
        create: false
        layout: table
        image: false
        info: "{{ page.parent.title }}"
        empty: Noch keine Kommentare

  games:
    label: Spiele
    icon: dashboard
    sections:
      games: sections/games

  pages:
    label: Seiten
    icon: page
    sections:
      pages:
        type: pages
        label: Seiten
        create: default
        image:
          back: white
      footerFields:
        type: fields
        fields:
          footerHeadline:
            label: Footer
            type: headline
          footerColumns:
            label: Spalten
            type: structure
            text: "{{ heading }}"
            empty: Noch keine Spalten angelegt.
            help: Jede Zeile wird zu einer Footer-Spalte – mit Überschrift und den darunter verlinkten Seiten. Reihenfolge frei sortierbar.
            fields:
              heading:
                label: Überschrift
                type: text
                required: true
              links:
                label: Seiten
                type: pages
                query: site.index.filterBy("template", "!=", "article")
                image:
                  back: white
          social:
            label: Social-Media
            type: structure
            text: "{{ platform }}"
            empty: Noch keine Profile verlinkt.
            fields:
              platform:
                label: Plattform
                type: select
                width: 1/3
                options:
                  instagram: Instagram
                  youtube: YouTube
                  rss: RSS-Feed
              url:
                label: URL
                type: url
                width: 2/3
                help: Beim RSS-Feed bleibt die URL leer – sie wird automatisch gesetzt.

  seo:
    label: SEO
    icon: search
    sections:
      seoFields:
        type: fields
        fields:
          description:
            extends: fields/description
            help: Eine kurze Beschreibung der Website. Wird für Seiten ohne eigene Beschreibung verwendet.
          thumbnail:
            extends: fields/thumbnail
            query: site.files.template('image')
            help: Wird für Seiten ohne eigenes Vorschaubild verwendet.

  images: tabs/images
