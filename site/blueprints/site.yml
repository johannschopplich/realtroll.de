title: Übersicht

tabs:
  content:
    label: Spiele
    icon: dashboard
    sections:
      games: sections/games

  blog:
    label: Blog
    icon: text
    sections:
      articles:
        type: pages
        label: Artikel
        parent: site.find("blog")
        template: article
        sortBy: date desc
        info: "{{ page.date.toDate('d.m.Y') }}"

  pages:
    label: Seiten
    icon: settings
    columns:
      - width: 1/2
        sections:
          pages:
            type: pages
            label: Seiten
            create: default
            image:
              back: white

      - width: 1/2
        sections:
          meta:
            extends: sections/meta
            type: fields
            fields:
              thumbnail:
                query: site.files.template("image")

  images: tabs/images
