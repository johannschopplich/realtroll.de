title: Spiel

icon: 🕹

tabs:
  content:
    label: Inhalt
    icon: draft
    columns:
      main:
        width: 2/3
        sections:
          text:
            type: fields
            fields:
              text:
                label: Text
                type: blocks
                fieldsets:
                  - heading
                  - text
                  - list
                  - character
                  - image
                  - video
                  - quote
                  - line
                  - screenshots
                  - gallery

      sidebar:
        width: 1/3
        sections:
          subpages:
            type: pages
            label: Unterseiten
            templates:
              - default
            help: Z. B. die Lösung des Spiels. Veröffentlichte Unterseiten werden auf der Spieleseite verlinkt.
          sidebar:
            type: fields
            fields:
              logo:
                label: Logo
                type: files
                multiple: false
                query: page.files.template('image')
                uploads: image
              heroScreenshot:
                label: Titelbild
                type: files
                multiple: false
                query: page.screenshots
                uploads: false
                width: 1/2
                help: Wenn leer, wird der erste Screenshot verwendet.

  gameData:
    label: Spieldaten
    icon: tag
    columns:
      main:
        width: 2/3
        sections:
          facts:
            type: fields
            fields:
              downloadHeadline:
                label: Download
                type: headline
              downloadLink:
                label: Link
                type: url
              downloadNote:
                label: Hinweis
                type: writer
                inline: true
              factsHeadline:
                label: Eckdaten
                type: headline
              published:
                label: Erstveröffentlichung
                type: date
                width: 1/2
              releaseStatus:
                label: Status
                type: select
                width: 1/2
                options:
                  demo: Demo
                  full-version: Vollversion
                  in-progress: In Arbeit
              engine:
                label: Engine
                type: text
                width: 1/2
                placeholder: RPG Maker 2003

      sidebar:
        width: 1/3
        sections:
          technical:
            type: fields
            fields:
              onlinePlayInfo:
                label: Onlinespielen
                type: info
                theme: info
                text: |
                  Damit das Spiel im Browser spielbar ist, muss der Spielordner per SFTP nach `public/play/games/` auf den Server hochgeladen und entpackt werden. Die `index.json` für den EasyRPG Player erzeugt der Server automatisch.
              gameFolder:
                label: Ordnername fürs Onlinespielen
                type: text
                help: Nur ausfüllen, wenn der Spielordner auf dem Server liegt. Nicht vom Redaktionsbereich aus handhabbar.

  images: tabs/images

  seo:
    label: SEO
    icon: search
    columns:
      main:
        width: 2/3
        sections:
          seoFields:
            type: fields
            fields:
              customTitle: fields/customTitle
              description:
                extends: fields/description
                help: Eine kurze Beschreibung des Spiels. Erscheint in Suchmaschinen und als Teaser auf der Spieleliste.
              thumbnail: fields/thumbnail
