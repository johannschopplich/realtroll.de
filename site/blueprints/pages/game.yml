title: Spiel

icon: 🕹

tabs:
  content:
    label: Seite
    icon: draft
    columns:
      main:
        width: 2/3
        fields:
          downloadLink:
            label: Downloadlink
            type: url
            width: 1/2
          published:
            label: Erstveröffentlichung
            type: date
            width: 1/2
          releaseStatus:
            label: Status
            type: select
            width: 1/2
            options:
              demo: Demo
              full-version: Vollversion
              in-progress: In Arbeit
          engine:
            label: Engine
            type: text
            width: 1/2
            placeholder: RPG Maker 2003
          intro:
            label: Intro
            type: blocks
          text:
            label: Text
            type: blocks

      sidebar:
        width: 1/3
        sections:
          subpages:
            type: pages
            label: Unterseiten
            templates:
              - default
            help: Z. B. die Lösung des Spiels. Veröffentlichte Unterseiten werden auf der Spieleseite verlinkt.
          sidebar:
            type: fields
            fields:
              logo:
                label: Logo
                type: files
                multiple: false
                query: page.files.template('image')
                uploads: image
              screenshots:
                label: Screenshots
                type: files
                query: page.files.template('image')
                uploads: image
              gameFolder:
                label: Ordnername fürs Onlinespielen
                type: text
                text:
                  - Nein
                  - Ja
                help: Nur ausfüllen, wenn das Spiel hochgeladen, entpackt, und die `index.json` für den EasyRPG Player generiert wurde. Nicht vom Redaktionsbereich aus handhabbar.
              cursor:
                label: Cursor
                type: files
                multiple: false
                query: page.files.template('image')
                uploads: image
                help: >
                  Derzeit ungenutze Spielerei.

          meta: sections/meta

  images: tabs/images
