title: Artikel

icon: 📝

options:
  changeTemplate: false

columns:
  main:
    width: 2/3
    sections:
      content:
        type: fields
        fields:
          date:
            label: Datum
            type: date
            default: today
            time: false
            required: true
          text:
            label: Inhalt
            type: blocks
            fieldsets:
              text:
                label: Text
                type: group
                fieldsets:
                  - heading
                  - text
                  - list
                  - quote
              media:
                label: Medien
                type: group
                fieldsets:
                  - image
              more:
                label: Mehr
                type: group
                fieldsets:
                  - line
      commentList:
        type: pages
        label: Kommentare
        template: comment
        status: all
        sortBy: date desc
        create: false
        info: "{{ page.date.toDate('d.m.Y H:i') }}"
        empty: Noch keine Kommentare

  sidebar:
    width: 1/3
    sections:
      options:
        type: fields
        fields:
          commentsEnabled:
            label: Kommentare erlauben
            type: toggle
            default: true
            text:
              - Gesperrt
              - Erlaubt
            help: Schaltet das Kommentarformular unter dem Artikel frei. Bei einer Kommentar-Flut kurz abschalten, aufräumen, wieder anschalten.
      images: sections/images
