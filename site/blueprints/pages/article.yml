title: Artikel

icon: 📝

options:
  changeTemplate: false

columns:
  main:
    width: 2/3
    fields:
      date:
        label: Datum
        type: date
        default: today
        time: false
        required: true
      text:
        label: Inhalt
        type: blocks
        fieldsets:
          text:
            label: Text
            type: group
            fieldsets:
              - heading
              - text
              - list
              - quote
          media:
            label: Medien
            type: group
            fieldsets:
              - image
          more:
            label: Mehr
            type: group
            fieldsets:
              - line

  sidebar:
    width: 1/3
    sections:
      images: sections/images
