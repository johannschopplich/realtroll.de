title: Seite

icon: 📄

tabs:
  content:
    label: Inhalt
    icon: draft
    columns:
      main:
        width: 2/3
        fields:
          text:
            label: Text
            type: blocks
            fieldsets:
              text:
                label: Text
                type: group
                fieldsets:
                  - heading
                  - text
                  - list
                  - quote
              media:
                label: Medien
                type: group
                fieldsets:
                  - image
                  - gallery
                  - video
              more:
                label: Mehr
                type: group
                fieldsets:
                  - code
                  - markdown
                  - line

      sidebar:
        width: 1/3
        sections:
          options:
            type: fields
            fields:
              chapterLayout:
                label: Kapitel-Akkordeon
                type: toggle
                default: false
                help: Jede H2-Überschrift wird ein aufklappbares Kapitel. Für Lösungen und Referenzseiten.
          images: sections/images

  seo: tabs/seo
