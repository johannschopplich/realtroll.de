name: field.blocks.image.name
icon: image
preview: image
fields:
  image:
    label: field.blocks.image.name
    type: files
    multiple: false
    image:
      back: black
    uploads:
      template: image
  pixelated:
    extends: fields/pixelated
    default: true
    width: 1/2
  scale:
    label: Vergrößerung
    type: toggles
    default: "1"
    options:
      - value: "1"
        text: Original
      - value: "2"
        text: 2×
      - value: "3"
        text: 3×
    width: 1/2
    help: Vergrößert kleine Pixelgrafiken in ganzen Stufen.
    when:
      pixelated: true
  alt:
    label: field.blocks.image.alt
    type: text
    icon: title
  caption:
    label: field.blocks.image.caption
    type: writer
    icon: text
    inline: true
